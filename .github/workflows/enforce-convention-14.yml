# Convention #14 enforcement — doc/code sync check (v2)
#
# Purpose
# -------
# Convention #14 in CLAUDE.md requires that every code or migration
# change land alongside a matching update in the active build doc under
# .claude/rules/current-builds/, and that stubs + BUILD_STATUS.md
# timestamps stay in sync with the build cadence. Pre-commit hooks can
# be bypassed with --no-verify; local ceremony drifts. This workflow
# runs remotely, cannot be bypassed, and adds zero local friction.
#
# v2 changes (2026-05-04, founder-approved)
# ------------------------------------------
# - ONE open issue at a time: checks for existing open doc-drift issue
#   before creating. If one exists, adds a comment with the new commit
#   info instead of opening a duplicate.
# - Commit message escape hatch: [drift-ok] in the commit message skips
#   the check entirely for intentional small fixes (dependency sync,
#   typo fix, CSS tweak) that don't need build doc tracking.
# - Result: the alarm bell still rings when build docs fall behind, but
#   it rings once instead of 65 times.
#
# Behavior
# --------
# - Auto-correctable drift (BUILD_STATUS.md timestamp lagging after an
#   apparent phase-completion commit): the workflow sed-patches today's
#   date into the "Last updated" line and pushes a follow-up commit:
#     `docs: auto-update BUILD_STATUS timestamp after <sha>`
#   Does NOT fail the triggering push. Silently no-ops if the sed
#   pattern doesn't match the file (first-run self-correction).
#
# - Non-correctable drift (code/migration change without a matching
#   .claude/rules/current-builds/*.md update): workflow opens ONE
#   tracking issue with the `doc-drift` label. Subsequent commits
#   without doc updates add comments to the existing issue instead
#   of opening new ones. The issue accumulates a running log.
#
# - Stub-related changes (STUB_REGISTRY.md touched): log-only in v1.
#   Per RECON_DECISIONS_RESOLVED.md Decision 3, stub-type taxonomy
#   formalization is required before enforcing counting/structure.
#   v2 parses and validates once Decision 3 followup lands.
#
# Loop prevention
# ---------------
# Job-level `if:` skips runs triggered by the github-actions bot itself
# AND skips commits whose message starts with `docs: auto-update`. Both
# conditions must be TRUE for the job to run. Either is sufficient to
# skip. Author check catches typical bot commits; startsWith catches
# edge cases where the bot identity is overridden.
#
# Permissions rationale
# ---------------------
# - contents: write  — auto-commit BUILD_STATUS.md timestamp
# - issues: write    — create/comment doc-drift tracking issues
# - pull-requests: read — scoped for future PR-linking enhancement

name: Enforce Convention #14

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  check:
    name: Doc/code sync check
    # Loop guard: skip bot-authored commits, auto-update follow-ups,
    # and commits with [drift-ok] escape hatch.
    if: >
      github.event.head_commit.author.name != 'github-actions[bot]' &&
      !startsWith(github.event.head_commit.message, 'docs: auto-update') &&
      !contains(github.event.head_commit.message, '[drift-ok]')
    runs-on: ubuntu-latest
    env:
      # Pass untrusted commit metadata via env vars, not inline ${{ }}
      # interpolation in shell, to avoid command injection.
      COMMIT_ID: ${{ github.event.head_commit.id }}
      COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$ZERO_SHA" ] || [ -z "$BEFORE_SHA" ]; then
            echo "Branch creation or missing before-SHA — skipping drift check."
            CHANGED=""
          else
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD)
          fi
          echo "Changed files in this push:"
          echo "$CHANGED"
          echo ""

          CODE=false
          BUILD_DOC=false
          BUILD_STATUS=false
          STUB=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/*|supabase/migrations/*) CODE=true ;;
              .claude/rules/current-builds/*.md) BUILD_DOC=true ;;
              BUILD_STATUS.md) BUILD_STATUS=true ;;
              STUB_REGISTRY.md) STUB=true ;;
            esac
          done <<< "$CHANGED"

          echo "code_changed=$CODE" >> "$GITHUB_OUTPUT"
          echo "build_doc_updated=$BUILD_DOC" >> "$GITHUB_OUTPUT"
          echo "build_status_updated=$BUILD_STATUS" >> "$GITHUB_OUTPUT"
          echo "stub_registry_updated=$STUB" >> "$GITHUB_OUTPUT"

          {
            echo "changed_files<<__FILE_LIST_EOF__"
            echo "$CHANGED" | head -50
            echo "__FILE_LIST_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Detect phase-completion signal
        id: phase
        shell: bash
        run: |
          set -euo pipefail
          MSG_LOWER="${COMMIT_MESSAGE,,}"
          IS_PHASE=false
          case "$MSG_LOWER" in
            "feat(prd-"*|"feat(phase-"*|"feat(build-"*) IS_PHASE=true ;;
            "complete(prd-"*|"complete(phase-"*|"complete(build-"*) IS_PHASE=true ;;
          esac
          if printf '%s' "$COMMIT_MESSAGE" | grep -qF "SIGNED OFF"; then
            IS_PHASE=true
          fi
          echo "is_phase_completion=$IS_PHASE" >> "$GITHUB_OUTPUT"
          echo "Phase-completion signal: $IS_PHASE"

      - name: Track doc-drift (single-issue, deduplicated)
        if: >
          steps.changes.outputs.code_changed == 'true' &&
          steps.changes.outputs.build_doc_updated == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed_files }}
        shell: bash
        run: |
          set -euo pipefail

          # Ensure doc-drift label exists (idempotent via --force).
          gh label create "doc-drift" \
            --description "Convention #14 violation: code/migration change without current-builds doc update" \
            --color "FBCA04" \
            --force || true

          SHORT_SHA="${COMMIT_ID:0:7}"
          FIRST_LINE=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1)

          # Check for an existing open doc-drift issue.
          EXISTING_ISSUE=$(gh issue list \
            --label "doc-drift" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_ISSUE" ]; then
            # Add a comment to the existing issue instead of opening a new one.
            COMMENT_FILE=$(mktemp)
            cat > "$COMMENT_FILE" <<EOF
          **Additional commit without doc update**

          Commit: $COMMIT_ID ($SHORT_SHA)
          Author: $COMMIT_AUTHOR
          Message: $FIRST_LINE

          Changed files:
          \`\`\`
          $CHANGED_FILES
          \`\`\`
          EOF

            gh issue comment "$EXISTING_ISSUE" --body-file "$COMMENT_FILE"
            echo "::warning::Doc-drift comment added to issue #$EXISTING_ISSUE for commit $SHORT_SHA"
          else
            # No open issue — create one.
            BODY_FILE=$(mktemp)
            cat > "$BODY_FILE" <<EOF
          **Convention #14 — build docs falling behind**

          Code or migration changes are landing without corresponding updates to the active build doc in \`.claude/rules/current-builds/\`.

          This issue stays open and accumulates commits until the build docs are updated. When you push a commit that includes a build doc update, close this issue.

          ---

          **First detected commit:**
          Commit: $COMMIT_ID ($SHORT_SHA)
          Author: $COMMIT_AUTHOR
          Message: $FIRST_LINE

          Changed files:
          \`\`\`
          $CHANGED_FILES
          \`\`\`

          ---

          **Resolution:** Update the active build doc in \`.claude/rules/current-builds/\` and close this issue. For commits that intentionally don't need doc tracking (dependency sync, typo fix), include \`[drift-ok]\` in the commit message.

          Auto-generated by \`.github/workflows/enforce-convention-14.yml\`.
          EOF

            gh issue create \
              --title "Build docs falling behind — doc-drift detected" \
              --label "doc-drift" \
              --body-file "$BODY_FILE"

            echo "::warning::Doc-drift issue opened for commit $SHORT_SHA"
          fi

      - name: Auto-commit BUILD_STATUS timestamp bump
        if: >
          steps.phase.outputs.is_phase_completion == 'true' &&
          steps.changes.outputs.build_status_updated == 'false'
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_ID:0:7}"

          if [ ! -f BUILD_STATUS.md ]; then
            echo "BUILD_STATUS.md not found in repo root — skipping auto-commit."
            exit 0
          fi

          TODAY=$(date -u '+%Y-%m-%d')

          sed -i -E "s/^(> ?\*?\*?Last [Uu]pdated:?\*?\*?[[:space:]]*)[0-9]{4}-[0-9]{2}-[0-9]{2}.*$/\1$TODAY/" BUILD_STATUS.md || true

          if git diff --quiet BUILD_STATUS.md; then
            echo "BUILD_STATUS.md unchanged after sed attempt — no follow-up commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BUILD_STATUS.md
          git commit -m "docs: auto-update BUILD_STATUS timestamp after $SHORT_SHA"
          git push
          echo "::notice::Auto-committed BUILD_STATUS timestamp bump after $SHORT_SHA"

      - name: Log stub-registry changes (v1 non-enforcing)
        if: steps.changes.outputs.stub_registry_updated == 'true'
        shell: bash
        run: |
          echo "::notice::STUB_REGISTRY.md modified in commit ${COMMIT_ID:0:7}. v1 logs only; v2 will parse and validate."
